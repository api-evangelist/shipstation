description: >-
  ShipStation is a leading shipping platform for ecommerce businesses providing
  APIs to integrate shipping workflows into applications. The ShipStation API
  enables developers to automate order management, create shipments, generate
  labels, track packages, manage warehouses, and connect to multiple carriers.
  ShipStation offers both V1 (ssapi.shipstation.com) and V2 (ShipEngine-powered)
  API versions.
