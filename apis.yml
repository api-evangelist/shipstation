aid: shipstation
url: https://raw.githubusercontent.com/api-evangelist/shipstation/refs/heads/main/apis.yml
apis:
  - aid: shipstation:shipstation-v1-api
    name: ShipStation V1 API
    tags:
      - Ecommerce
      - Labels
      - Order Management
      - Shipping
    humanURL: https://www.shipstation.com/docs/api/
    properties:
      - url: https://www.shipstation.com/docs/api/
        type: Documentation
      - url: openapi/shipstation-v1-openapi.yml
        type: OpenAPI
      - url: json-schema/shipstation-order-schema.json
        type: JSONSchema
      - url: json-schema/shipstation-shipment-schema.json
        type: JSONSchema
      - url: json-ld/shipstation-context.jsonld
        type: JSONLD
      - url: rules/shipstation-rules.yml
        type: SpectralRules
      - url: capabilities/ecommerce-shipping.yaml
        type: NaftikoCapabilities
      - url: vocabulary/shipstation-vocabulary.yml
        type: Vocabulary
    description: >-
      The ShipStation V1 API provides programmatic access to ShipStation's
      shipping platform for ecommerce businesses. Endpoints cover order
      management, shipment creation, label generation, carrier rate shopping,
      package tracking, warehouse management, product management, and store
      integrations. Authentication uses HTTP Basic auth with API key and secret.
      Base URL is https://ssapi.shipstation.com with a rate limit of 40 requests
      per minute.
  - aid: shipstation:shipstation-v2-api
    name: ShipStation V2 API
    tags:
      - Ecommerce
      - Labels
      - Order Management
      - Shipping
    humanURL: https://docs.shipstation.com/
    properties:
      - url: https://docs.shipstation.com/
        type: Documentation
      - url: https://docs.shipstation.com/rest
        type: API Reference
    description: >-
      The ShipStation V2 API is the next-generation shipping and inventory API
      built on ShipEngine technology. It provides improved endpoints for
      creating orders, managing customers, querying order and shipping data,
      and integrating with ShipStation's multi-carrier shipping platform.
      Available to Standard plan and higher accounts with the API add-on.
