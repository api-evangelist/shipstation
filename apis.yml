aid: shipstation
name: ShipStation
description: >-
  ShipStation is a shipping platform that provides APIs to integrate shipping
  workflows into ecommerce applications. The ShipStation API enables developers
  to automate order management, create shipments, generate labels, track
  packages, and manage shipping settings across multiple carriers.
