naftiko: "1.0.0-alpha1"

info:
  label: "ShipStation V1 API"
  description: "ShipStation shipping platform API for order management, label generation, and multi-carrier shipping"
  tags:
    - Ecommerce
    - Labels
    - Order Management
    - Shipping
    - Warehousing
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SHIPSTATION_API_KEY: SHIPSTATION_API_KEY
      SHIPSTATION_API_SECRET: SHIPSTATION_API_SECRET

capability:
  consumes:
    - type: http
      namespace: shipstation
      baseUri: https://ssapi.shipstation.com
      description: "ShipStation V1 shipping API"
      authentication:
        type: basic
        username: "{{SHIPSTATION_API_KEY}}"
        password: "{{SHIPSTATION_API_SECRET}}"
      resources:
        - name: orders
          path: /orders
          description: "Manage ecommerce orders"
          operations:
            - name: list-orders
              method: GET
              description: "List orders with filtering"
              inputParameters:
                - name: orderStatus
                  in: query
                  type: string
                  required: false
                  description: "Filter by order status"
                - name: orderNumber
                  in: query
                  type: string
                  required: false
                  description: "Filter by order number"
                - name: createDateStart
                  in: query
                  type: string
                  required: false
                  description: "Filter by create date start"
                - name: createDateEnd
                  in: query
                  type: string
                  required: false
                  description: "Filter by create date end"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page (max 500)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-order
              method: POST
              description: "Create a new order in ShipStation"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  orderNumber: "{{tools.order_number}}"
                  orderDate: "{{tools.order_date}}"
                  orderStatus: "{{tools.order_status}}"
                  shipTo: "{{tools.ship_to}}"
                  items: "{{tools.items}}"

        - name: shipments
          path: /shipments
          description: "Manage shipments"
          operations:
            - name: list-shipments
              method: GET
              description: "List shipments with filtering"
              inputParameters:
                - name: orderNumber
                  in: query
                  type: string
                  required: false
                  description: "Filter by order number"
                - name: trackingNumber
                  in: query
                  type: string
                  required: false
                  description: "Filter by tracking number"
                - name: carrierCode
                  in: query
                  type: string
                  required: false
                  description: "Filter by carrier"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-label
              method: POST
              description: "Create a shipping label for an order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  orderId: "{{tools.order_id}}"
                  carrierCode: "{{tools.carrier_code}}"
                  serviceCode: "{{tools.service_code}}"
                  packageCode: "{{tools.package_code}}"
                  shipDate: "{{tools.ship_date}}"
                  weight: "{{tools.weight}}"
            - name: get-rates
              method: POST
              description: "Get shipping rates for a shipment"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  carrierCode: "{{tools.carrier_code}}"
                  fromPostalCode: "{{tools.from_postal_code}}"
                  toPostalCode: "{{tools.to_postal_code}}"
                  toCountry: "{{tools.to_country}}"
                  weight: "{{tools.weight}}"
            - name: void-label
              method: POST
              description: "Void a shipping label"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  shipmentId: "{{tools.shipment_id}}"

        - name: carriers
          path: /carriers
          description: "Manage carrier connections"
          operations:
            - name: list-carriers
              method: GET
              description: "List all connected carriers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-carrier-services
              method: GET
              description: "List services for a carrier"
              inputParameters:
                - name: carrierCode
                  in: query
                  type: string
                  required: true
                  description: "Carrier code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: customers
          path: /customers
          description: "Manage customer records"
          operations:
            - name: list-customers
              method: GET
              description: "List customers"
              inputParameters:
                - name: countryCode
                  in: query
                  type: string
                  required: false
                  description: "Filter by country"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: products
          path: /products
          description: "Manage product records"
          operations:
            - name: list-products
              method: GET
              description: "List products"
              inputParameters:
                - name: sku
                  in: query
                  type: string
                  required: false
                  description: "Filter by SKU"
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Filter by product name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: warehouses
          path: /warehouses
          description: "Manage warehouse locations"
          operations:
            - name: list-warehouses
              method: GET
              description: "List all warehouses"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-warehouse
              method: POST
              description: "Add a new warehouse location"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  warehouseName: "{{tools.warehouse_name}}"
                  originAddress: "{{tools.origin_address}}"

        - name: stores
          path: /stores
          description: "Manage marketplace store connections"
          operations:
            - name: list-stores
              method: GET
              description: "List connected marketplace stores"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: fulfillments
          path: /fulfillments
          description: "Manage third-party fulfillments"
          operations:
            - name: list-fulfillments
              method: GET
              description: "List fulfillments"
              inputParameters:
                - name: orderId
                  in: query
                  type: integer
                  required: false
                  description: "Filter by order ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: shipstation-rest
      resources:
        - path: /v1/orders
          name: orders
          description: "Manage orders"
          operations:
            - method: GET
              name: list-orders
              description: "List orders"
              call: "shipstation.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-order
              description: "Create an order"
              call: "shipstation.create-order"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/shipments
          name: shipments
          description: "Manage shipments"
          operations:
            - method: GET
              name: list-shipments
              description: "List shipments"
              call: "shipstation.list-shipments"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/labels
          name: labels
          description: "Create shipping labels"
          operations:
            - method: POST
              name: create-label
              description: "Create label"
              call: "shipstation.create-label"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rates
          name: rates
          description: "Get carrier rates"
          operations:
            - method: POST
              name: get-rates
              description: "Get rates"
              call: "shipstation.get-rates"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/carriers
          name: carriers
          description: "List carriers"
          operations:
            - method: GET
              name: list-carriers
              description: "List carriers"
              call: "shipstation.list-carriers"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/warehouses
          name: warehouses
          description: "Manage warehouses"
          operations:
            - method: GET
              name: list-warehouses
              description: "List warehouses"
              call: "shipstation.list-warehouses"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/stores
          name: stores
          description: "Manage stores"
          operations:
            - method: GET
              name: list-stores
              description: "List stores"
              call: "shipstation.list-stores"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: shipstation-mcp
      transport: http
      tools:
        - name: list-orders
          description: "List ShipStation orders with optional filters"
          hints:
            readOnly: true
          call: "shipstation.list-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-order
          description: "Create a new order in ShipStation"
          hints:
            readOnly: false
          call: "shipstation.create-order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-shipping-label
          description: "Create a shipping label for an order"
          hints:
            readOnly: false
          call: "shipstation.create-label"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-shipping-rates
          description: "Get shipping rates from carriers for a package"
          hints:
            readOnly: true
          call: "shipstation.get-rates"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shipments
          description: "List shipments with tracking and carrier info"
          hints:
            readOnly: true
          call: "shipstation.list-shipments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-carriers
          description: "List all connected shipping carriers"
          hints:
            readOnly: true
          call: "shipstation.list-carriers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-warehouses
          description: "List configured warehouse locations"
          hints:
            readOnly: true
          call: "shipstation.list-warehouses"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-stores
          description: "List connected marketplace stores"
          hints:
            readOnly: true
          call: "shipstation.list-stores"
          outputParameters:
            - type: object
              mapping: "$."
