naftiko: 1.0.0-alpha2
info:
  label: ShipStation V1 API — Orders
  description: 'ShipStation V1 API — Orders. 9 operations. Lead operation: List Orders. Self-contained Naftiko capability
    covering one Shipstation business surface.'
  tags:
  - Shipstation
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SHIPSTATION_API_KEY: SHIPSTATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: v1-orders
    baseUri: https://ssapi.shipstation.com
    description: ShipStation V1 API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: List Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerName
          in: query
          type: string
          description: Returns orders that match the specified name
        - name: itemKeyword
          in: query
          type: string
          description: Returns orders that contain items that match the specified keyword
        - name: createDateStart
          in: query
          type: string
          description: Returns orders that were created in ShipStation after the specified date
        - name: createDateEnd
          in: query
          type: string
          description: Returns orders that were created in ShipStation before the specified date
        - name: modifyDateStart
          in: query
          type: string
          description: Returns orders modified after the specified date
        - name: modifyDateEnd
          in: query
          type: string
          description: Returns orders modified before the specified date
        - name: orderDateStart
          in: query
          type: string
          description: Returns orders that were placed after the specified date
        - name: orderDateEnd
          in: query
          type: string
          description: Returns orders that were placed before the specified date
        - name: orderNumber
          in: query
          type: string
          description: Filter by order number
        - name: orderStatus
          in: query
          type: string
          description: Filter by order status
        - name: paymentDateStart
          in: query
          type: string
        - name: paymentDateEnd
          in: query
          type: string
        - name: storeId
          in: query
          type: integer
          description: Filters orders by store
        - name: sortBy
          in: query
          type: string
        - name: sortDir
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
      - name: createorupdateorder
        method: POST
        description: Create or Update Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-createorder
      path: /orders/createorder
      operations:
      - name: createorder
        method: POST
        description: Create Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-createorders
      path: /orders/createorders
      operations:
      - name: createorders
        method: POST
        description: Create Orders (Bulk)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-holduntil
      path: /orders/holduntil
      operations:
      - name: holdorderuntil
        method: POST
        description: Hold Order Until
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-markasshipped
      path: /orders/markasshipped
      operations:
      - name: markorderasshipped
        method: POST
        description: Mark Order as Shipped
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: integer
          description: The system-generated identifier for the order
          required: true
      - name: deleteorder
        method: DELETE
        description: Delete Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: integer
          required: true
    - name: orders-orderId-assignuser
      path: /orders/{orderId}/assignuser
      operations:
      - name: assignordertouser
        method: POST
        description: Assign Order to User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.SHIPSTATION_USER}}'
      password: '{{env.SHIPSTATION_PASS}}'
  exposes:
