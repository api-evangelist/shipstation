          orderDateStart: rest.orderDateStart
          orderDateEnd: rest.orderDateEnd
          orderNumber: rest.orderNumber
          orderStatus: rest.orderStatus
          paymentDateStart: rest.paymentDateStart
          paymentDateEnd: rest.paymentDateEnd
          storeId: rest.storeId
          sortBy: rest.sortBy
          sortDir: rest.sortDir
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
