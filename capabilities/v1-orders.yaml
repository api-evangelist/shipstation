        description: Delete Order
        call: v1-orders.deleteorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}/assignuser
      name: orders-orderid-assignuser
      description: REST surface for orders-orderId-assignuser.
      operations:
      - method: POST
        name: assignordertouser
