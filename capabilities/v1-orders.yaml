        - type: object
          mapping: $.
    - path: /v1/orders/createorders
      name: orders-createorders
      description: REST surface for orders-createorders.
      operations:
      - method: POST
        name: createorders
        description: Create Orders (Bulk)
        call: v1-orders.createorders
        with:
          body: rest.body
        outputParameters:
        - type: object
