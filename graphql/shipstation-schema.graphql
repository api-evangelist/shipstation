# ─────────────────────────────────────────────
# Pagination and Input Types
# ─────────────────────────────────────────────

"""Pagination metadata."""
type PageInfo {
  total: Int!
  page: Int!
  pages: Int!
  pageSize: Int!
}

"""Paginated list of orders."""
type OrderConnection {
  orders: [Order]
  pageInfo: PageInfo!
}

"""Paginated list of shipments."""
type ShipmentConnection {
  shipments: [Shipment]
  pageInfo: PageInfo!
}

"""Paginated list of returns."""
type ReturnConnection {
  returns: [Return]
  pageInfo: PageInfo!
}

"""Input for creating or updating an order."""
input OrderInput {
  orderNumber: String!
  orderKey: String
  orderDate: DateTime!
  orderStatus: OrderStatus!
  shipTo: ShipToInput!
  billTo: BillToInput
  items: [OrderItemInput]
  carrierCode: String
  serviceCode: String
  packageCode: String
  confirmation: ConfirmationType
  shipDate: DateTime
  weight: WeightInput
  dimensions: DimensionInput
  insuranceOptions: InsuranceOptionsInput
  internationalOptions: InternationalOptionsInput
  advancedOptions: AdvancedOptionsInput
  tagIds: [Int]
  internalNotes: String
  customerNotes: String
  gift: Boolean
  giftMessage: String
}

"""Input for ship-to address."""
input ShipToInput {
  name: String!
  company: String
  street1: String!
  street2: String
  street3: String
  city: String!
  state: String!
  postalCode: String!
  country: String!
  phone: String
  residential: Boolean
}

"""Input for bill-to address."""
input BillToInput {
  name: String
  company: String
  street1: String
  street2: String
  city: String
  state: String
  postalCode: String
  country: String
  phone: String
  email: String
}

"""Input for an order line item."""
input OrderItemInput {
  lineItemKey: String
  sku: String
  name: String!
  quantity: Int!
  unitPrice: Decimal
  weight: WeightInput
  imageUrl: String
  warehouseLocation: String
  options: [CustomFieldInput]
  productId: Int
  upc: String
}

"""Input for weight."""
input WeightInput {
  value: Decimal!
  units: String!
}

"""Input for package dimensions."""
input DimensionInput {
  length: Decimal
  width: Decimal
  height: Decimal
  units: String
}

"""Input for insurance options."""
input InsuranceOptionsInput {
  provider: String
  insureShipment: Boolean
  insuredValue: Decimal
}

"""Input for international shipping options."""
input InternationalOptionsInput {
  contents: ContentsType
  nonDelivery: NonDeliveryOption
}

"""Input for advanced order options."""
input AdvancedOptionsInput {
  warehouseId: Int
  nonMachinable: Boolean
  saturdayDelivery: Boolean
  containsAlcohol: Boolean
  storeId: Int
  customField1: String
  customField2: String
  customField3: String
  source: String
  billToParty: String
  billToAccount: String
  billToPostalCode: String
  billToCountryCode: String
}

"""Input for custom field."""
input CustomFieldInput {
  name: String!
  value: String
}

"""Input for rate shopping."""
input RateInput {
  carrierCode: String
  serviceCode: String
  packageCode: String
  fromPostalCode: String!
  toState: String
  toCountry: String!
  toPostalCode: String!
  toCity: String
  weight: WeightInput!
  dimensions: DimensionInput
  confirmation: ConfirmationType
  residential: Boolean
}

"""Input for creating a shipment."""
input CreateShipmentInput {
  orderId: Int!
  carrierCode: String!
  serviceCode: String!
  packageCode: String
  confirmation: ConfirmationType
  shipDate: DateTime
  weight: WeightInput!
  dimensions: DimensionInput
  insuranceOptions: InsuranceOptionsInput
  internationalOptions: InternationalOptionsInput
  advancedOptions: AdvancedOptionsInput
}

# ─────────────────────────────────────────────
# Root Types
# ─────────────────────────────────────────────

type Query {
  """Retrieve a single order by ID."""
  order(orderId: Int!): Order

  """List orders with optional filters."""
  orders(
    orderStatus: OrderStatus
    storeId: Int
    tagId: Int
    customerId: Int
    orderDateStart: DateTime
    orderDateEnd: DateTime
    modifyDateStart: DateTime
    modifyDateEnd: DateTime
    page: Int
    pageSize: Int
  ): OrderConnection

  """Retrieve a single shipment by ID."""
  shipment(shipmentId: Int!): Shipment

  """List shipments with optional filters."""
  shipments(
    recipientName: String
    recipientCountryCode: String
    orderNumber: String
    orderId: Int
    carrierCode: String
    serviceCode: String
    trackingNumber: String
    shipDateStart: DateTime
    shipDateEnd: DateTime
    voidDateStart: DateTime
    voidDateEnd: DateTime
    storeId: Int
    includeShipmentItems: Boolean
    page: Int
    pageSize: Int
  ): ShipmentConnection

  """List carriers connected to the account."""
  carriers: [Carrier]

  """Retrieve available services for a carrier."""
  carrierServices(carrierCode: String!): [CarrierService]

  """Retrieve available package codes for a carrier."""
  carrierPackages(carrierCode: String!): [PackageCode]

  """Rate shop across carriers for the given package."""
  rates(input: RateInput!): [Rate]

  """List warehouses."""
  warehouses: [Warehouse]

  """Retrieve a single warehouse."""
  warehouse(warehouseId: Int!): Warehouse

  """List connected stores."""
  stores: [Store]

  """Retrieve a single store."""
  store(storeId: Int!): Store

  """List returns."""
  returns(
    returnStatus: ReturnStatus
    page: Int
    pageSize: Int
  ): ReturnConnection

  """List users on the account."""
  users: [User]

  """Retrieve account information."""
  account: Account

  """List webhooks."""
  webhooks: [Webhook]
}

type Mutation {
  """Create a new order."""
  createOrder(input: OrderInput!): Order

  """Update an existing order."""
  updateOrder(orderId: Int!, input: OrderInput!): Order

  """Delete an order."""
  deleteOrder(orderId: Int!): Boolean

  """Hold an order until a specified date."""
  holdOrder(orderId: Int!, holdUntilDate: DateTime): Order

  """Release an order from hold."""
  releaseOrder(orderId: Int!): Order

  """Mark an order as shipped."""
  markOrderAsShipped(orderId: Int!, carrierCode: String!, shipDate: DateTime, trackingNumber: String, notifyCustomer: Boolean, notifyShipFrom: Boolean): Order

  """Create a shipment label for an order."""
  createShipment(input: CreateShipmentInput!): Shipment

  """Void an existing shipping label."""
  voidLabel(shipmentId: Int!): Boolean

  """Add a tag to an order."""
  addTagToOrder(orderId: Int!, tagId: Int!): Boolean

  """Remove a tag from an order."""
  removeTagFromOrder(orderId: Int!, tagId: Int!): Boolean

  """Create a return for an order."""
  createReturn(orderId: Int!, reason: String, comments: String): Return

  """Create a new warehouse."""
  createWarehouse(warehouseName: String!, originAddress: ShipToInput!, returnAddress: ShipToInput, isDefault: Boolean): Warehouse

  """Update a warehouse."""
  updateWarehouse(warehouseId: Int!, warehouseName: String, originAddress: ShipToInput, returnAddress: ShipToInput, isDefault: Boolean): Warehouse

  """Delete a warehouse."""
  deleteWarehouse(warehouseId: Int!): Boolean

  """Register a webhook subscription."""
  createWebhook(hookType: String!, url: String!, name: String, storeId: Int): Webhook

  """Delete a webhook subscription."""
  deleteWebhook(webhookId: Int!): Boolean
}
