}

"""A fulfillment record linking orders to fulfillment centers."""
type Fulfillment {
  fulfillmentId: Int!
  orderId: Int!
  orderNumber: String
  userId: String
  customerEmail: String
  trackingNumber: String
  createDate: DateTime
  shipDate: DateTime
  voidDate: DateTime
  deliveryDate: DateTime
  carrierCode: String
  fulfillmentProviderCode: String
  fulfillmentServiceCode: String
  fulfillmentFee: Decimal
  voidRequested: Boolean
  voided: Boolean
  marketplaceNotified: Boolean
  notifyErrorMessage: String
