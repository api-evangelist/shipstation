"""
ShipStation GraphQL Schema
Conceptual schema representing the ShipStation multi-carrier shipping platform REST API (V1 + V2)
as GraphQL types for tooling, documentation, and integration design purposes.
Source: https://www.shipstation.com/docs/api/ and https://docs.shipstation.com/
"""

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar Decimal
scalar JSON

# ─────────────────────────────────────────────
# Enumerations
# ─────────────────────────────────────────────

enum OrderStatus {
  AWAITING_PAYMENT
  AWAITING_SHIPMENT
  SHIPPED
  ON_HOLD
  CANCELLED
  PENDING_FULFILLMENT
}

enum ShipmentStatus {
  LABEL_PURCHASED
  VOIDED
  DELIVERED
  RETURNED
  IN_TRANSIT
}

enum ReturnStatus {
  PENDING
  APPROVED
  REJECTED
  RECEIVED
  REFUNDED
}

enum ContentsType {
  MERCHANDISE
  DOCUMENTS
  GIFT
  RETURNED_GOODS
  SAMPLE
}

enum NonDeliveryOption {
  RETURN_TO_SENDER
  TREAT_AS_ABANDONED
}

enum ConfirmationType {
  NONE
  DELIVERY
  SIGNATURE
  ADULT_SIGNATURE
  DIRECT_SIGNATURE
}

enum CarrierCode {
  STAMPS_COM
  UPS
  FEDEX
  USPS
  DHL_EXPRESS
  CANADA_POST
  ROYAL_MAIL
  AUSTRALIA_POST
  GLOBALPOST
  DPD
}

# ─────────────────────────────────────────────
# Address and Contact Types
# ─────────────────────────────────────────────

"""Postal address used for ship-to and bill-to fields."""
type OrderAddress {
  name: String
  company: String
  street1: String
  street2: String
  street3: String
  city: String
  state: String
  postalCode: String
  country: String
  phone: String
  residential: Boolean
}

"""Destination address for a shipment."""
type ShipTo {
  name: String!
  company: String
  street1: String!
  street2: String
  street3: String
  city: String!
  state: String!
  postalCode: String!
  country: String!
  phone: String
  residential: Boolean
}

"""Billing address for an order."""
type BillTo {
  name: String
  company: String
  street1: String
  street2: String
  city: String
  state: String
  postalCode: String
  country: String
  phone: String
  email: String
}

# ─────────────────────────────────────────────
# Weight and Dimension Types
# ─────────────────────────────────────────────

"""Weight of an item or shipment."""
type ItemWeight {
  value: Decimal!
  units: String!
}

"""Physical dimensions of an item or package."""
type ItemDimension {
  length: Decimal
  width: Decimal
  height: Decimal
  units: String
}

"""Weight of a shipment package."""
type ShipmentWeight {
  value: Decimal!
  units: String!
}

"""Dimensions of a shipment package."""
type ShipmentDimension {
  length: Decimal
  width: Decimal
  height: Decimal
  units: String
}

# ─────────────────────────────────────────────
# Item and SKU Types
# ─────────────────────────────────────────────

"""SKU reference for an order line item."""
type ItemSKU {
  sku: String
  upc: String
  asin: String
  mpn: String
}

"""Detailed attributes of an order item."""
type ItemDetail {
  name: String!
  imageUrl: String
  warehouseLocation: String
  productId: Int
  options: [CustomField]
}

"""A line item within an order."""
type OrderItem {
  orderItemId: Int
  lineItemKey: String
  sku: String
  name: String!
  imageUrl: String
  weight: ItemWeight
  quantity: Int!
  unitPrice: Decimal
  taxAmount: Decimal
  shippingAmount: Decimal
  warehouseLocation: String
  options: [CustomField]
  productId: Int
  fulfillmentSku: String
  adjustment: Boolean
  upc: String
  detail: ItemDetail
  skuDetail: ItemSKU
  dimensions: ItemDimension
}

# ─────────────────────────────────────────────
# Custom Fields and Tags
# ─────────────────────────────────────────────

"""A key-value custom field attached to orders or items."""
type CustomField {
  name: String!
  value: String
}

"""A tag applied to an order for categorization and filtering."""
type OrderTag {
  tagId: Int!
  name: String!
  color: String
}

"""A tag applied to a shipment."""
type ShipmentTag {
  tagId: Int!
  name: String!
  color: String
}

# ─────────────────────────────────────────────
# Payment Types
# ─────────────────────────────────────────────

"""Method of payment used for an order."""
type PaymentMethod {
  name: String
  type: String
}

"""Monetary amount with currency."""
type PaymentAmount {
  amount: Decimal!
  currency: String!
}

# ─────────────────────────────────────────────
# Gift and Advanced Option Types
# ─────────────────────────────────────────────

"""Gift message attached to an order or shipment."""
type GiftMessage {
  message: String
  from: String
  to: String
}

"""Gift configuration for an order."""
type Gift {
  isGift: Boolean
  message: GiftMessage
  giftWrap: Boolean
  price: Decimal
}

"""Gift options for an order."""
type GiftOptions {
  gift: Gift
  giftMessage: String
}

"""Source store from which an order originated."""
type SourceStore {
  storeId: Int
  storeName: String
  marketplaceName: String
}

"""Merchant-assigned reference identifiers."""
type MerchantRef {
  orderNumber: String
  customerOrderNumber: String
  externalOrderId: String
}

"""Store identifier for routing orders."""
type StoreID {
  storeId: Int!
  storeName: String
}

"""Advanced routing and fulfillment options for an order."""
type AdvancedOptions {
  warehouseId: Int
  nonMachinable: Boolean
  saturdayDelivery: Boolean
  containsAlcohol: Boolean
  mergedOrSplit: Boolean
  mergedIds: [Int]
  parentId: Int
  storeId: Int
  customField1: String
  customField2: String
  customField3: String
  source: String
  billToParty: String
  billToAccount: String
  billToPostalCode: String
  billToCountryCode: String
  billToMyOtherAccount: Int
}

# ─────────────────────────────────────────────
# International Options Types
# ─────────────────────────────────────────────

"""Insurance options for a shipment."""
type InsuranceOptions {
  provider: String
  insureShipment: Boolean
  insuredValue: InsuredValue
}

"""Insured value amount."""
type InsuredValue {
  amount: Decimal!
  currency: String!
}

"""International shipping customs and delivery options."""
type InternationalOptions {
  contents: ContentsType
  customsItems: [CustomField]
  nonDelivery: NonDeliveryOption
}

# ─────────────────────────────────────────────
# Carrier, Service, and Rate Types
# ─────────────────────────────────────────────

"""Service code identifying a carrier service level."""
type ServiceCode {
  serviceCode: String!
  name: String!
  domestic: Boolean
  international: Boolean
}

"""Package type code for a carrier."""
type PackageCode {
  packageCode: String!
  name: String!
}

"""A carrier connected to a ShipStation account."""
type Carrier {
  carrierId: String!
  code: CarrierCode!
  name: String!
  accountNumber: String
  requiresFundedAccount: Boolean
  balance: Decimal
  nickname: String
  shippingProviderId: Int
  primary: Boolean
  services: [CarrierService]
  packages: [PackageCode]
}

"""A specific service available from a carrier."""
type CarrierService {
  carrierId: String!
  serviceCode: String!
  name: String!
  domestic: Boolean!
  international: Boolean!
}

"""Carrier-level shipment record."""
type CarrierShipment {
  trackingNumber: String
  carrier: Carrier
  service: CarrierService
  estimatedDeliveryDate: DateTime
}

"""Detail breakdown of a shipping rate."""
type RateDetail {
  otherCost: Decimal
  insurance: Decimal
  confirmation: Decimal
  fuelSurcharge: Decimal
}

"""A shipping rate returned from rate shopping."""
type Rate {
  serviceCode: String!
  serviceName: String!
  carrierCode: String!
  carrierName: String!
  shipmentCost: Decimal!
  otherCost: Decimal
  transitDays: Int
  validUntilDate: DateTime
  rateDetail: RateDetail
}

# ─────────────────────────────────────────────
# Label Types
# ─────────────────────────────────────────────

"""Raw label data (PDF or ZPL bytes)."""
type LabelData {
  labelData: String
  labelFormat: String
  labelLayout: String
}

"""A shipping label generated for a shipment."""
type Label {
  labelId: Int!
  shipmentId: Int!
  trackingNumber: String!
  labelUrl: String
  labelData: LabelData
  voided: Boolean!
  voidedAt: DateTime
  batchId: Int
  carrierId: String
  serviceCode: String
  packageCode: String
  createdAt: DateTime
}

# ─────────────────────────────────────────────
# Shipment Types
# ─────────────────────────────────────────────

"""Items included in a shipment."""
type ShipmentItems {
  items: [OrderItem]
  totalItems: Int
}

"""Detailed information about a shipment."""
type ShipmentDetail {
  carrierCode: String
  serviceCode: String
  packageCode: String
  confirmation: ConfirmationType
  dimensions: ShipmentDimension
  weight: ShipmentWeight
  insuranceOptions: InsuranceOptions
  internationalOptions: InternationalOptions
  advancedOptions: AdvancedOptions
}

"""A shipment record in ShipStation."""
type Shipment {
  shipmentId: Int!
  orderId: Int!
  orderKey: String
  userId: String
  orderNumber: String
  shipDate: DateTime
  createdDate: DateTime
  modifiedDate: DateTime
  shipTo: ShipTo
  weight: ShipmentWeight
  dimensions: ShipmentDimension
  insuranceOptions: InsuranceOptions
  advancedOptions: AdvancedOptions
  shipmentCost: Decimal
  serviceCode: String
  packageCode: String
  confirmation: ConfirmationType
  carrierCode: String
  trackingNumber: String
  isReturnLabel: Boolean
  batchId: Int
  warehouseId: Int
  voided: Boolean
  voidDate: DateTime
  marketplaceNotified: Boolean
  notifyErrorMessage: String
  shipmentStatus: ShipmentStatus
  label: Label
  items: ShipmentItems
  tags: [ShipmentTag]
  detail: ShipmentDetail
  carrierShipment: CarrierShipment
}

# ─────────────────────────────────────────────
