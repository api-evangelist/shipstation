# ─────────────────────────────────────────────

"""Detailed order attributes."""
type OrderDetail {
  internalNotes: String
  customerNotes: String
  giftMessage: String
  paymentMethod: PaymentMethod
  requestedShippingService: String
  amountPaid: Decimal
  taxAmount: Decimal
  shippingAmount: Decimal
  customerEmail: String
  customerId: Int
  externallyFulfilled: Boolean
