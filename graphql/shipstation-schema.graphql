# ─────────────────────────────────────────────
# Fulfillment and Warehouse Types
# ─────────────────────────────────────────────

"""Origin address for a warehouse."""
type WarehouseOrigin {
  name: String!
  company: String
  street1: String!
  street2: String
  city: String!
  state: String!
  postalCode: String!
  country: String!
  phone: String
}

"""Detailed information about a warehouse."""
type WarehouseDetails {
  isDefault: Boolean
  registrationDate: DateTime
  origins: [WarehouseOrigin]
}

"""A warehouse location in ShipStation."""
type Warehouse {
  warehouseId: Int!
  warehouseName: String!
  originAddress: WarehouseOrigin!
